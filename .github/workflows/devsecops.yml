name: DevSecOps Checks

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependencies:
    name: Dependency scan
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Scan backend dependencies
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: stage-backend
          path: Backend
          format: HTML
          out: dependency-check-report

      - name: Upload backend dependency report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-dependency-check-report
          path: dependency-check-report

  containers:
    name: Container scan
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t stage-frontend:scan ./frontend

      - name: Build backend image
        run: docker build -t stage-backend:scan ./Backend

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: stage-frontend:scan
          format: table
          severity: HIGH,CRITICAL

      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: stage-backend:scan
          format: table
          severity: HIGH,CRITICAL
